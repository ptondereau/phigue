name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: "Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run tests
        run: vendor/bin/phpunit

  quality:
    name: "Quality (lint, analyze, format)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Set up Mago
        uses: nhedger/setup-mago@v2
        with:
          version: 1.40.0

      - name: Check formatting
        run: mago format --check

      - name: Lint
        run: mago lint

      - name: Analyze
        run: mago analyze
